name: Generate Stats Cards

on:
  schedule:
    - cron: "0 * * * *" # Atualiza a cada hora
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate GitHub Stats Card
        uses: github-readme-stats-team/github-readme-stats-action@v1
        with:
          # Gera o card de estatísticas com seus parâmetros
          # O parâmetro include_all_commits=true é o que vai buscar seus 2k+ commits
          gh_payload: '{"username":"crkautza","show_icons":true,"theme":"tokyonight","count_private":true,"include_all_commits":true,"hide_border":true}'
          output_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
