name: Generate Stats Cards

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate GitHub Stats Card
        uses: vn7n24f1tr5h/github-readme-stats-github-action@v1.0.0
        with:
          output_dir: dist
          gh_payload: '{"username":"crkautza","show_icons":true,"theme":"tokyonight","count_private":true,"include_all_commits":true,"hide_border":true}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
