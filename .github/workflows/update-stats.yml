name: Generate Stats Cards

on:
  schedule:
    - cron: "0 * * * *" # Atualiza a cada hora, junto com a cobra
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate Custom Stats Card
        uses: anuraghazra/github-readme-stats@master
        with:
          queries: |
            stats?username=crkautza&show_icons=true&theme=tokyonight&count_private=true&include_all_commits=true
          output: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
