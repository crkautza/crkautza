name: Update README cards

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          # Adicionei seus parâmetros de tema e contagem total
          options: username=crkautza&show_icons=true&theme=tokyonight&count_private=true&include_all_commits=true
          path: profile/stats.svg
          # IMPORTANTE: Usando o seu PAT aqui para ver os commits privados
          token: ${{ secrets.TOKEN_STATS }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          mkdir -p profile
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
